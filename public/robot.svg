<svg width="800" height="800" viewBox="0 0 800 800" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Robot Head -->
  <rect x="300" y="200" width="200" height="180" rx="20" fill="url(#gradient1)" class="animate-float"/>
  <circle cx="350" y="250" r="20" fill="#6366F1"/>
  <circle cx="450" y="250" r="20" fill="#6366F1"/>
  <path d="M360 300 L440 300" stroke="#6366F1" stroke-width="8" stroke-linecap="round"/>
  
  <!-- Robot Body -->
  <rect x="250" y="400" width="300" height="200" rx="30" fill="url(#gradient2)" class="animate-float" style="animation-delay: 0.2s"/>
  
  <!-- Robot Arms -->
  <rect x="150" y="420" width="100" height="30" rx="15" fill="url(#gradient3)" class="animate-float" style="animation-delay: 0.4s"/>
  <rect x="550" y="420" width="100" height="30" rx="15" fill="url(#gradient3)" class="animate-float" style="animation-delay: 0.4s"/>
  
  <!-- Robot Legs -->
  <rect x="280" y="600" width="40" height="100" rx="20" fill="url(#gradient4)" class="animate-float" style="animation-delay: 0.6s"/>
  <rect x="480" y="600" width="40" height="100" rx="20" fill="url(#gradient4)" class="animate-float" style="animation-delay: 0.6s"/>
  
  <!-- Panel Details -->
  <rect x="300" y="450" width="200" height="100" rx="10" fill="url(#gradient5)"/>
  <circle cx="350" y="500" r="15" fill="#818CF8"/>
  <circle cx="400" y="500" r="15" fill="#818CF8"/>
  <circle cx="450" y="500" r="15" fill="#818CF8"/>
  
  <!-- Gradients -->
  <defs>
    <linearGradient id="gradient1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#6366F1"/>
    </linearGradient>
    <linearGradient id="gradient2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#818CF8"/>
    </linearGradient>
    <linearGradient id="gradient3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#818CF8"/>
      <stop offset="100%" stop-color="#A5B4FC"/>
    </linearGradient>
    <linearGradient id="gradient4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#6366F1"/>
    </linearGradient>
    <linearGradient id="gradient5" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#C7D2FE"/>
      <stop offset="100%" stop-color="#E0E7FF"/>
    </linearGradient>
  </defs>
</svg>
